<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report History</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

        <div class="col-5">
                                <button type="button" class="btn btn-success w-20"><a href="{{ url_for('dashboard') }}" class="text-white text-decoration-none">Back</a>
                                </button>
                            </div>

<div class="container mt-4">

    <h4 class="mb-3">Report History</h4>

    <!-- Search Form -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form method="POST" action="/report_history" class="row g-3 align-items-end">

                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Search</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Table -->
    {% if cools %}

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-bordered table-striped mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Details</th>
                        <th>Comments</th>
                        <th>Time In</th>
                        <th>Sign In</th>
                        <th>Time Out</th>
                        <th>Sign Out</th>
                        <th>Shift</th>
                    </tr>
                </thead>

                <tbody>
                    {% for cool in cools %}
                    <tr>
                        <td>{{ cool.date }}</td>
                        <td><textarea class="form-control" rows="2" readonly>{{ cool.detail }}</textarea></td>
                        <td><textarea class="form-control" rows="2" readonly>{{ cool.comment }}</textarea></td>
                        <td>{{ cool.time_in }}</td>
                        <td>{{ cool.sign_in }}</td>
                        <td>{{ cool.time_out }}</td>
                        <td>{{ cool.sign_out }}</td>
                        <td>{{ cool.shift }}</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

    {% else %}

        <div class="alert alert-warning">
            No records found.
        </div>

    {% endif %}

</div>

</body>
</html>
