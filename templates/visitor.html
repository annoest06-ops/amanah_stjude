<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Registration</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="col-5">
                                <button type="button" class="btn btn-success w-20"><a href="{{ url_for('dashboard') }}" class="text-white text-decoration-none">Back</a>
                                </button>
                            </div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="text-center mb-4">Visitor Registration</h4>

                    <form action="/visitor_reg" method="POST">

                        <div class="row g-3">

                            <!-- Date -->
                            <div class="col-md-6">
                                <label class="form-label">Date</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>

                            <!-- Name -->
                            <div class="col-md-6">
                                <label class="form-label">Name</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>

                            <!-- ID -->
                            <div class="col-md-6">
                                <label class="form-label">ID Number</label>
                                <input type="text" name="id_no" class="form-control" required>
                            </div>

                            <!-- Contact -->
                            <div class="col-md-6">
                                <label class="form-label">Contact</label>
                                <input type="tel" name="contact" class="form-control" required>
                            </div>

                            <!-- Destination -->
                            <div class="col-md-6">
                                <label class="form-label">Destination</label>
                                <input type="text" name="destiny" class="form-control" required>
                            </div>

                            <!-- Category -->
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select name="category" class="form-select">
                                    <option value="">Select</option>
                                    <option value="parent">Parent 🟢</option>
                                    <option value="casual">Casual 🟡</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>

                            <!-- Reason -->
                            <div class="col-12">
                                <label class="form-label">Reason</label>
                                <textarea name="reason" class="form-control" rows="2" required></textarea>
                            </div>

                            <!-- Items -->
                            <div class="col-12">
                                <label class="form-label">Items</label>
                                <textarea name="items" class="form-control" rows="2" required></textarea>
                            </div>

                            <!-- Time In -->
                            <div class="col-md-6">
                                <label class="form-label">Time In</label>
                                <input type="time" name="time_in" class="form-control" required>
                            </div>

                            <!-- Confirm -->
                             <div class="col-md-6">
                                <label class="form-label">Sign</label>
                                <input type="text" name="confirm" class="form-control" required>
                            </div>

                        

                            <!-- Submit -->
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100">
                                    Submit
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
