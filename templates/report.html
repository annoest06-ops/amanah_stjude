<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


        <div class="col-5">
                                <button type="button" class="btn btn-success w-20"><a href="{{ url_for('dashboard') }}" class="text-white text-decoration-none">Back</a>
                                </button>
                            </div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="text-center mb-4">Daily Report</h4>

                    <form action="/report" method="POST">

                        <!-- Date -->
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control">
                        </div>

                        <!-- Shift -->
                        <div class="mb-3">
                            <label class="form-label">Shift</label>
                            <select name="shift" class="form-select">
                                <option value="">Select shift</option>
                                <option value="Day">Day</option>
                                <option value="Night">Night</option>
                            </select>
                        </div>

                        <!-- Details -->
                        <div class="mb-3">
                            <label class="form-label">Details</label>
                            <textarea name="detail" class="form-control" rows="3" placeholder="Details of items"></textarea>
                        </div>

                        <!-- Comments -->
                        <div class="mb-3">
                            <label class="form-label">Comments</label>
                            <textarea name="comment" class="form-control" rows="3" placeholder="Additional comments"></textarea>
                        </div>

                        <!-- Time In -->
                        <div class="mb-3">
                            <label class="form-label">Time In</label>
                            <input type="time" name="time_in" class="form-control">
                        </div>

                        <!-- Sign In -->

                        <div class="mb-3">
                    <label class="form-label">Sign In</label>
                    <input type="text" name="sign_in" class="form-control" required>
                </div>
                       

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
