<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow-lg text-center p-4" style="max-width: 500px; border-radius: 15px;">

        <!-- Icon -->
        <div class="mb-3">
            <h1 class="text-danger">⚠️</h1>
        </div>

        <!-- Title -->
        <h3 class="text-danger fw-bold">Error Occurred</h3>

        <!-- Message -->
        <p class="text-muted mt-3">
            Something went wrong while processing your request.<br>
            Please try again later or contact support if the issue continues.
        </p>

        <!-- Button -->
        <a href="/dashboard_route" class="btn btn-primary mt-3">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
