<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Cars Registration</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

        <div class="col-5">
                                <button type="button" class="btn btn-success w-20"><a href="{{ url_for('dashboard') }}" class="text-white text-decoration-none">Back</a>
                                </button>
                            </div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="text-center mb-4">School Cars Registration</h4>

                    <form action="/school_cars" method="POST">

                        <!-- Date -->
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control" required>
                        </div>

                        <!-- Driver Name -->
                        <div class="mb-3">
                            <label class="form-label">Driver Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <!-- Car Number -->
                        <div class="mb-3">
                            <label class="form-label">Vehicle No</label>
                            <input type="text" name="car_no" class="form-control" required>
                        </div>

                        <!-- Status -->
                        <div class="mb-3">
                            <label class="form-label">Status:(car is get)</label>
                            <select name="status" class="form-select">
                                <option value="">Select status</option>
                                <option value="Inside">Inside</option>
                                <option value="Outside">Outside</option>
                            </select>
                        </div>

                        <!-- Time -->
                        <div class="mb-3">
                            <label class="form-label">Time</label>
                            <input type="time" name="time" class="form-control" required>
                        </div>

                        <!-- Confirm -->

                        <div class="mb-3">
                            <label class="form-label">Sign</label>
                            <input type="text" name="confirm" class="form-control" required>
                        </div>

                       

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Allow</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
