<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Items Registration</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


        <div class="col-5">
                                <button type="button" class="btn btn-success w-20"><a href="{{ url_for('dashboard') }}" class="text-white text-decoration-none">Back</a>
                                </button>
                            </div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="text-center mb-4">Student Items Registration</h4>

                    <form action="/student_items" method="POST">

                        <!-- Date -->
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control" required>
                        </div>

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <!-- Form -->
                        <div class="mb-3">
                            <label class="form-label">Form</label>
                            <input type="text" name="form" class="form-control" required>
                        </div>

                        <!-- Items -->
                        <div class="mb-3">
                            <label class="form-label">Items</label>
                            <textarea name="items" class="form-control" rows="3" required></textarea>
                        </div>

                        <!-- Issued To -->
                        <div class="mb-3">
                            <label class="form-label">Issued To</label>
                            <input type="text" name="issued" value="Guard" class="form-control" readonly>
                        </div>

                        <!-- Confirm -->

                        <div class="mb-3">
                            <label class="form-label">Sign</label>
                            <input type="text" name="confirm"  class="form-control" required>
                        </div>


                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
