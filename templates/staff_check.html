<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Check</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

        <div class="col-5">
                                <button type="button" class="btn btn-success w-20"><a href="{{ url_for('dashboard') }}" class="text-white text-decoration-none">Back</a>
                                </button>
                            </div>

<div class="container mt-4">

    <h4 class="mb-3">Staff Check</h4>

    {% if checks %}

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-bordered table-striped mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Time Out</th>
                        <th>Time In</th>
                        <th>Sign</th>
                        <th>Allow</th>
                    </tr>
                </thead>

                <tbody>

                    {% for check in checks %}
                    <tr>
                        <form action="/staff_check" method="POST" class="d-flex gap-2">
                        <td>{{ check.date }}</td>

                        <td>
                            
                                <input type="text" name="name" value="{{ check.name }}" class="form-control form-control-sm" readonly>
                                
                            
                        </td>

                        <td><input type="time" name="time_out" value="{{ check.time_out }}" class="form-control form-control-sm" readonly></td>
                        <td><input type="time" name="time_in" class="form-control form-control-sm" required></td>
                        <td><input type="text" name="sign_in" class="form-control form-control-sm" required></td>

                        <td><button type="submit" class="btn btn-sm btn-success">Allow</button></td>

                        </form>
                        
                    </tr>
                    {% endfor %}

                </tbody>
            </table>

        </div>
    </div>

    {% else %}

        <div class="alert alert-warning">
            No data found
        </div>

    {% endif %}

</div>

</body>
</html>
